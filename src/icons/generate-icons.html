<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h3>Icon Generator - Open this file in a browser to generate PNG icons</h3>
<canvas id="canvas"></canvas>
<div id="output"></div>
<script>
// Generate PNG icons from canvas drawing
const sizes = [72, 96, 128, 192, 512];
const output = document.getElementById('output');

sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.125);
    ctx.fill();

    // Clock circle
    const cx = size / 2;
    const cy = size * 0.47;
    const r = size * 0.27;
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = size * 0.023;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    // Hour hand
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = size * 0.016;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - r * 0.65);
    ctx.stroke();

    // Minute hand
    ctx.strokeStyle = '#888888';
    ctx.lineWidth = size * 0.012;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * 0.45, cy + r * 0.2);
    ctx.stroke();

    // Center dot
    ctx.fillStyle = '#00e676';
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.016, 0, Math.PI * 2);
    ctx.fill();

    // Text
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${size * 0.09}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('STUDY', cx, size * 0.84);

    // Create download link
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.textContent = `Download icon-${size}.png`;
    link.style.display = 'block';
    link.style.margin = '10px';
    output.appendChild(link);

    // Auto-click to download
    // link.click();
});
</script>
</body>
</html>
