name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows executables
        run: npx electron-builder --win nsis portable --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: DeepFocus ${{ github.ref_name }}
          files: dist/*.exe
          draft: false
          prerelease: false
          body: |
            ## Downloads
            
            **Windows:** Download the `.exe` file below
            - `DeepFocus-Setup` - Installer (recommended)
            - `DeepFocus-Portable` - No install needed, run directly
            
            **Android:** Visit https://owaissh59-spec.github.io/DeepFocus/ in Chrome, tap menu > "Add to Home Screen"

  deploy-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload PWA to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
