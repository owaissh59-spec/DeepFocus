name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate app icon
        run: |
          npm install --no-save sharp png2icons
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const png2icons = require('png2icons');
          const svg = fs.readFileSync('src/icons/icon.svg');
          async function gen() {
            await sharp(svg).resize(256, 256).png().toFile('build/icon.png');
            const pngBuf = fs.readFileSync('build/icon.png');
            const ico = png2icons.createICO(pngBuf, png2icons.BILINEAR, 0, true, true);
            fs.writeFileSync('build/icon.ico', ico);
            console.log('Icons generated: build/icon.png, build/icon.ico');
          }
          gen();
          "
        shell: pwsh

      - name: Build Windows
        run: npx electron-builder --win nsis portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: DeepFocus ${{ github.ref_name }}
          files: dist/*.exe
          draft: false
          prerelease: false
          body: |
            ## Downloads
            
            **Windows:** Download the `.exe` file below
            - `DeepFocus-Setup` - Installer (recommended)
            - `DeepFocus-Portable` - No install needed, run directly
            
            **Android:** Visit https://owaissh59-spec.github.io/DeepFocus/ in Chrome, tap menu > "Add to Home Screen"

  deploy-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload PWA to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
